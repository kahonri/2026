<h3 class="subtitle13">肌活マテラマスクの<br />特徴</h3>
<div class="bclensing4_img_box">
<div class="bclensing4_img_box_in mt20_sph">
<div class="bclensing4_img_box_l01">
<div class="bclensing4_img_box_bg">
<p class="title_3">業界初※の<br />マテラ蓄熱シート</p>
<div class="bclensing4_img"><img src="/dcms_media/image/materamask-feature01.png" width="198" height="198" /></div>
</div>
<p class="bclensing4_tit">肌にのせた体温をキャッチし、遠赤外線で肌の巡りを活性化。肌をやわらかく整え、美容成分がなじみやすい状態へ。</p>
</div>
<div class="bclensing4_img_box_l02">
<div class="bclensing4_img_box_bg">
<p class="title_3">ポリシー化粧品初！<br />オートファジーに<br />着目した処方</p>
<div class="bclensing4_img"><img src="/dcms_media/image/materamask-feature02.png" width="198" height="198" /></div>
</div>
<p class="bclensing4_tit">細胞内の古いたんぱく質などを分解して再利用する「オートファジー」に着目。セイヨウネズエキスがその働きをサポートし、肌の透明感がアップ。</p>
</div>
<div class="bclensing4_img_box_r">
<div class="bclensing4_img_box_bg">
<p class="title_3">透明感を引き出す<br />成分を高配合</p>
<div class="bclensing4_img"><img src="/dcms_media/image/materamask-feature03.png" width="198" height="198" /></div>
</div>
<p class="bclensing4_tit">「グルタチオン」×「アルブチン」のW配合で、内側から発光するようなツヤと透明感を。澄みわたるようなクリアな素肌へ。</p>
</div>
