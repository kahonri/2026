<h3 class="subtitle03" style="text-align: center;">肌活マテラマスクの特徴</h3>

<li>

<img src="/dcms_media/image/materamask-feature01.png" alt="業界初のマテラ蓄熱シート" width="198" height="198" />
<p>肌にのせた体温をキャッチし、遠赤外線で肌の巡りを活性化。肌をやわらかく整え、美容成分がなじみやすい状態へ。</p>
</li>

<p>細胞内の古いたんぱく質などを分解して再利用する「オートファジー」に着目。セイヨウネズエキスがその働きをサポートし、肌の透明感がアップ。</p>
</li>
<li>
<h4 class="subtitle04">透明感を引き出す<br />成分を高配合</h4>

<p>「グルタチオン」×「アルブチン」のW配合で、内側から発光するようなツヤと透明感を。澄みわたるようなクリアな素肌へ。</p>
