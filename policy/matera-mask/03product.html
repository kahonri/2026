<h3 class="subtitle03">肌エネルギーを巡らす肌活マスクシート</h3>
<p class="cleansing_text"><span style="font-size: 12pt;">業界初のマテラ練り込み蓄熱シートが体温をキャッチし、遠赤外線で肌の巡りを活性化。オートファジー成分「セイヨウネズエキス」が細胞の浄化力（オートファジー）を引き出し、グルタチオン×アルブチンのW配合が透明感とツヤをもたらします。肌エネルギーを巡らし、より肌結果へアプローチする、マスクシートです。</span><br /><br /><span style="font-size: 10pt;">&nbsp; 5枚入り（美容液25ml/1枚）</span><br /><span style="font-size: 10pt;">&nbsp; 5,940円（税抜5,400円）</span></p>
