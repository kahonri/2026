<h3 class="subtitle03">業界初のマテラの蓄熱シートが、<br />肌の奥の「オートファジー」を目覚めさせる</h3>
<p>オートファジーとは、細胞の中で古くなったタンパク質や不要な物質を<br />&#8220;分解して再利用する&#8221;細胞の浄化システムのこと。<br />オートファジーがきちんと働くことで、肌の中※がクリアに保たれ、透明感がアップ！</p>
